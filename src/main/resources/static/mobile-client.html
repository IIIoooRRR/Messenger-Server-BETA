<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Messenger Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: #eee;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: #1a1a2a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .header {
            background: #2a2a3a;
            padding: 12px 16px;
            border-bottom: 1px solid #3a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #ffaa66;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #7d2e2e;
        }
        .status-badge.online {
            background: #2e7d32;
        }
        .auth-panel {
            background: #2a2a3a;
            padding: 12px 16px;
            border-bottom: 1px solid #3a3a4a;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        input, button {
            background: #3a3a4a;
            border: none;
            padding: 10px 14px;
            border-radius: 24px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        input {
            flex: 1;
            min-width: 120px;
            background: #2a2a3a;
            border: 1px solid #4a4a6a;
        }
        button {
            background: #4c9aff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #5a5a6a;
            opacity: 0.6;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .action-buttons button {
            flex: 1;
            background: #3a5a8a;
        }
        .user-info {
            background: #22222e;
            padding: 8px 16px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #3a3a4a;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1a1a2a;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            word-break: break-word;
            font-size: 0.95rem;
        }
        .message.in {
            background: #2d2d44;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.out {
            background: #3a5a7a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            text-align: right;
        }
        .message.system {
            background: #2a2a3a;
            align-self: center;
            font-size: 0.7rem;
            color: #aaa;
            max-width: 90%;
            text-align: center;
        }
        .send-panel {
            background: #2a2a3a;
            padding: 12px;
            border-top: 1px solid #3a3a4a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .recipient-row {
            display: flex;
            gap: 8px;
        }
        .message-row {
            display: flex;
            gap: 8px;
        }
        .message-row input {
            flex: 1;
        }
        .offline-row {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .offline-row button {
            flex: 1;
            background: #4a4a6a;
        }
        .small-text {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            padding: 5px;
        }
        .error {
            color: #ff8888;
            font-size: 0.8rem;
            padding: 4px 12px;
            background: #4a2a2a;
            border-radius: 12px;
            margin: 4px;
        }
        @media (max-width: 480px) {
            .input-row input, .recipient-row input, .message-row input {
                font-size: 0.9rem;
            }
            button {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>📱 Messenger</h1>
        <div id="wsStatus" class="status-badge">⚫ OFFLINE</div>
    </div>

    <div class="auth-panel">
        <div class="input-row">
            <input type="text" id="username" placeholder="Имя (латиница)" value="kezess" autocomplete="off">
            <input type="password" id="password" placeholder="Пароль (мин. 8)" autocomplete="off">
        </div>
        <div class="action-buttons">
            <button id="loginBtn">🔑 Войти</button>
            <button id="registerBtn">📝 Создать</button>
            <button id="logoutBtn" disabled>🚪 Выйти</button>
        </div>
        <div id="apiError" class="error" style="display: none;"></div>
    </div>

    <div class="user-info" id="userInfo" style="display: none;">
        <span>👤 <span id="displayName">—</span></span>
        <span>🆔 <span id="userId">—</span></span>
        <span>📡 <span id="userStatus">OFFLINE</span></span>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="message system">✨ Войдите, чтобы начать общение</div>
    </div>

    <div class="send-panel" id="sendPanel" style="display: none;">
        <div class="recipient-row">
            <input type="text" id="recipientName" placeholder="Кому отправить" value="Maria" autocomplete="off">
        </div>
        <div class="message-row">
            <input type="text" id="messageText" placeholder="Сообщение" autocomplete="off">
            <button id="sendBtn">📤</button>
        </div>
        <div class="offline-row">
            <button id="getOfflineBtn">📬 Получить оффлайн</button>
            <button id="clearChatBtn">🗑 Очистить</button>
        </div>
    </div>
    <div class="small-text" id="serverInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script>
    // ---- Конфигурация ----
    const API_BASE = window.location.origin;
    const WS_URL = `/ws`;

    let stompClient = null;
    let currentUser = null;
    let connected = false;

    // DOM элементы
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const displayNameSpan = document.getElementById('displayName');
    const userIdSpan = document.getElementById('userId');
    const userStatusSpan = document.getElementById('userStatus');
    const wsStatusDiv = document.getElementById('wsStatus');
    const messagesArea = document.getElementById('messagesArea');
    const recipientNameInput = document.getElementById('recipientName');
    const messageTextInput = document.getElementById('messageText');
    const sendBtn = document.getElementById('sendBtn');
    const getOfflineBtn = document.getElementById('getOfflineBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const apiErrorDiv = document.getElementById('apiError');
    const userInfoDiv = document.getElementById('userInfo');
    const sendPanel = document.getElementById('sendPanel');
    const serverInfoSpan = document.getElementById('serverInfo');

    serverInfoSpan.textContent = `Сервер: ${window.location.host}`;

    function showError(msg) {
        apiErrorDiv.textContent = msg;
        apiErrorDiv.style.display = 'block';
        setTimeout(() => { apiErrorDiv.style.display = 'none'; }, 4000);
    }

    function addMessage(text, type = 'system') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.textContent = text;
        messagesArea.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    async function md5(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('MD5', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function updateUIAfterLogin(user) {
        displayNameSpan.textContent = user.name;
        userIdSpan.textContent = user.id.substring(0, 12) + '…';
        userStatusSpan.textContent = 'ONLINE';
        userInfoDiv.style.display = 'flex';
        sendPanel.style.display = 'flex';
        loginBtn.disabled = true;
        registerBtn.disabled = true;
        logoutBtn.disabled = false;
        usernameInput.disabled = true;
        passwordInput.disabled = true;
        wsStatusDiv.className = 'status-badge online';
        wsStatusDiv.textContent = '🟢 ONLINE';
        addMessage(`✅ Вы вошли как ${user.name}`, 'system');
    }

    function resetUI() {
        if (stompClient && stompClient.connected) stompClient.disconnect(() => {});
        stompClient = null;
        connected = false;
        currentUser = null;
        wsStatusDiv.className = 'status-badge';
        wsStatusDiv.textContent = '⚫ OFFLINE';
        userInfoDiv.style.display = 'none';
        sendPanel.style.display = 'none';
        loginBtn.disabled = false;
        registerBtn.disabled = false;
        logoutBtn.disabled = true;
        usernameInput.disabled = false;
        passwordInput.disabled = false;
        addMessage('🔌 Вы вышли', 'system');
    }

    function connectWebSocket(userId) {
        if (stompClient && stompClient.connected) {
            stompClient.disconnect(() => doConnect(userId));
        } else {
            doConnect(userId);
        }
    }

    function doConnect(userId) {
        // 🔧 Принудительно используем только HTTP-транспорты
        const socket = new SockJS(WS_URL, null, { transports: ['xhr-streaming', 'xhr-polling'] });
        stompClient = Stomp.over(socket);
        const headers = { id: userId };

        stompClient.connect(headers,
            () => {
                connected = true;
                wsStatusDiv.className = 'status-badge online';
                wsStatusDiv.textContent = '🟢 ONLINE';
                userStatusSpan.textContent = 'ONLINE';
                addMessage('🔌 Соединение установлено (HTTP)', 'system');

                stompClient.subscribe(`/user/queue/messages`, (message) => {
                    const payload = JSON.parse(message.body);
                    if (Array.isArray(payload)) {
                        payload.forEach(msg => {
                            addMessage(`📩 ${msg.fromUser}: ${msg.textMessage}`, 'in');
                        });
                    } else {
                        addMessage(`📩 ${payload.fromUser}: ${payload.textMessage}`, 'in');
                    }
                });
            },
            (error) => {
                connected = false;
                wsStatusDiv.className = 'status-badge';
                wsStatusDiv.textContent = '⚠️ ERROR';
                userStatusSpan.textContent = 'OFFLINE';
                addMessage(`⚠️ Ошибка соединения: ${error}`, 'system');
                console.error(error);
            }
        );
    }

    // API
    async function register() {
        const name = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!name || !password || password.length < 8) {
            showError('Имя и пароль (мин. 8 символов) обязательны');
            return;
        }
        const id = await md5(name);
        const userData = { id, name, password, age: 18, avatarUrl: null, userStatus: 'OFFLINE' };
        try {
            const resp = await fetch(`${API_BASE}/add/user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            if (resp.ok) {
                addMessage(`✅ Пользователь ${name} создан! Теперь войдите.`, 'system');
            } else if (resp.status === 409) {
                showError(`Пользователь ${name} уже существует`);
            } else {
                showError(`Ошибка ${resp.status}`);
            }
        } catch (err) {
            showError(`Сетевая ошибка: ${err.message}`);
        }
    }

    async function login() {
        const name = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!name || !password || password.length < 8) {
            showError('Введите имя и пароль (мин. 8 символов)');
            return;
        }
        try {
            const resp = await fetch(`${API_BASE}/get-name-user/${encodeURIComponent(name)}`);
            if (!resp.ok) {
                if (resp.status === 404) showError(`Пользователь ${name} не найден`);
                else showError(`Ошибка ${resp.status}`);
                return;
            }
            const user = await resp.json();
            currentUser = { name: user.name, id: user.id };
            updateUIAfterLogin(currentUser);
            connectWebSocket(currentUser.id);
        } catch (err) {
            showError(`Ошибка: ${err.message}`);
        }
    }

    function logout() {
        if (stompClient) stompClient.disconnect(() => resetUI());
        else resetUI();
    }

    async function sendMessage() {
        if (!stompClient || !stompClient.connected) {
            addMessage('❌ Нет соединения', 'system');
            return;
        }
        const toName = recipientNameInput.value.trim();
        const text = messageTextInput.value.trim();
        if (!toName || !text) return;
        const toId = await md5(toName);
        const message = {
            fromUser: currentUser.id,
            toUser: toId,
            textMessage: text,
            timestamp: new Date().toISOString()
        };
        stompClient.send("/app/chat/send", {}, JSON.stringify(message));
        addMessage(`📤 [${toName}] ${text}`, 'out');
        messageTextInput.value = '';
    }

    function getOfflineMessages() {
        if (!stompClient || !stompClient.connected) {
            addMessage('❌ Нет соединения', 'system');
            return;
        }
        stompClient.send("/app/chat/get", {}, JSON.stringify({ id: currentUser.id }));
        addMessage(`📬 Запрошены оффлайн-сообщения`, 'system');
    }

    function clearChat() {
        messagesArea.innerHTML = '<div class="message system">✨ Чат очищен</div>';
    }

    // Инициализация
    loginBtn.addEventListener('click', login);
    registerBtn.addEventListener('click', register);
    logoutBtn.addEventListener('click', logout);
    sendBtn.addEventListener('click', sendMessage);
    getOfflineBtn.addEventListener('click', getOfflineMessages);
    clearChatBtn.addEventListener('click', clearChat);
    messageTextInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    recipientNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') messageTextInput.focus();
    });

    addMessage('📱 Мобильный клиент готов. Введите имя и пароль.', 'system');
</script>
</body>
</html>
